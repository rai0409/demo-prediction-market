<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}予想マーケット・デモビューア{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body data-poll-seconds="{{ poll_seconds }}">
    <header class="topbar">
      <a class="brand" href="/">
        <span>予想マーケット・デモビューア</span>
        <small>Demo Prediction Market Viewer</small>
      </a>
      <nav>
        <a href="/">マーケット</a>
        <a href="/demo-wallet">デモポイント管理</a>
        <a href="/demo-positions">デモポジション</a>
        <a href="/demo-results">デモ結果</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', path='/app.js') }}"></script>
  </body>
</html>

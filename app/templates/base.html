<!doctype html>
<html lang="{{ lang | default('ja') }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ t("app.title") }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
    <script>
      window.APP_LANG = "{{ lang | default('ja') }}";
      window.I18N = {{ js_i18n | default({}) | tojson }};
    </script>
  </head>
  <body data-quick-refresh-seconds="{{ quick_refresh_seconds }}" data-detail-refresh-seconds="{{ detail_refresh_seconds }}" data-csrf-token="{{ csrf_token }}">
    <header class="topbar">
      <a class="brand" href="/?lang={{ lang | default('ja') }}">
        <span>{{ t("app.title") }}</span>
        <small>{{ t("app.subtitle") }}</small>
      </a>

      <nav>
        <a href="/markets?lang={{ lang | default('ja') }}">{{ t("nav.markets") }}</a>
        <a href="/demo-wallet?lang={{ lang | default('ja') }}">{{ t("nav.demo_wallet") }}</a>
        <a href="/demo-positions?lang={{ lang | default('ja') }}">{{ t("nav.positions") }}</a>
        <a href="/demo-results?lang={{ lang | default('ja') }}">{{ t("nav.results") }}</a>
      </nav>

      <div class="lang-switch" aria-label="{{ t('nav.language') }}">
        <a href="{{ lang_url_ja }}" class="{% if lang == 'ja' %}active{% endif %}">JA</a>
        <span>/</span>
        <a href="{{ lang_url_en }}" class="{% if lang == 'en' %}active{% endif %}">EN</a>
      </div>

    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', path='/app.js') }}"></script>
  </body>
</html>
